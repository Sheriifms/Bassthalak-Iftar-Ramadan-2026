<script>
let attendees={};

fetch("attendees.json")
.then(r=>r.json())
.then(data=>{
  data.forEach(p=>attendees[p.ID]=p);
});

function onScanSuccess(decodedText){
  let id=decodedText.replace("ID:","").trim();
  let p=attendees[id];

  if(p){

    fetch("https://script.google.com/macros/s/AKfycbxYwlehoUhN67A_AUoUl1p810aA0b0ElLIm0UBMoHV9HEVgQmM7yLJqdm02Ojh6Y7buEw/exec",{
      method:"POST",
      body: JSON.stringify({
        name:p.Name,
        department:p.Department,
        city:p.City
      })
    });

    document.getElementById("result").innerHTML=
      "<b>"+p.Name+"</b><br>"+
      "Department: "+p.Department+"<br>"+
      "City: "+p.City+"<br><span style='color:green'>✔ Allowed</span>";

  }else{
    document.getElementById("result").innerHTML="<span style='color:red'>Unknown QR</span>";
  }
}

let scanner=new Html5QrcodeScanner("reader",{fps:10,qrbox:250});
scanner.render(onScanSuccess);
</script>
